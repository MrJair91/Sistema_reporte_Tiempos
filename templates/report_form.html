{% extends "base.html" %}

{% block content %}
<h1>Nuevo reporte de dedicación</h1>

<form method="POST" class="card" id="reportForm">
    <label>Empleado</label>
    <select name="employee_id" required>
        {% for employee in employees %}
        <option value="{{ employee.id }}">{{ employee.name }} - {{ employee.role }}</option>
        {% endfor %}
    </select>

    <label>Periodo</label>
    <input type="text" name="period" required placeholder="Ejemplo: 2026-05 o Semana 21">

    <h3>Distribución porcentual</h3>

    <div id="rows">
        <div class="report-row">
            <select name="project_id" required>
                {% for project in projects %}
                <option value="{{ project.id }}">{{ project.name }}</option>
                {% endfor %}
            </select>

            <input type="number" name="percentage" min="0" max="100" step="0.01" required placeholder="%">
        </div>
    </div>

    <button type="button" onclick="addRow()">Agregar proyecto</button>

    <p><strong>Total:</strong> <span id="total">0</span>%</p>

    <label>Observaciones</label>
    <textarea name="observations" placeholder="Comentarios adicionales del reporte"></textarea>

    <button type="submit">Guardar reporte</button>
</form>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% endblock %}
